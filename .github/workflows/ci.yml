name: Smart Online Shopping CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  test:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'


    - name: Check PHP files
      run: |
        php -l index.php
        php -l login.php
        php -l products.php
        php -l register.php